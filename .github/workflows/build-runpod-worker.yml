name: Build RunPod Worker

on:
  push:
    paths:
      - 'services/api/runpod-worker/**'
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/api/runpod-worker
          file: services/api/runpod-worker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/leadflow-musetalk:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/leadflow-musetalk:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
