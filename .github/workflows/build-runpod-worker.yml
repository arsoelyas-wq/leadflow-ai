name: Build RunPod Worker

on:
  push:
    paths:
      - 'services/api/runpod-worker/**'
      - '.github/workflows/build-runpod-worker.yml'
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache MuseTalk models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: services/api/runpod-worker/musetalk_models
          key: musetalk-models-v6

      - name: Download MuseTalk models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          pip install "huggingface_hub>=0.20.0" gdown requests
          python << 'PYEOF'
          import os, sys, shutil, urllib.request, subprocess
          from huggingface_hub import snapshot_download, hf_hub_download

          base = "services/api/runpod-worker/musetalk_models"

          def mkd(*parts):
              p = os.path.join(base, *parts)
              os.makedirs(p, exist_ok=True)
              return p



          # ── 1. TMElyralab/MuseTalk → musetalk/ + musetalkV15/ ──────────────
          print("=== 1/6: MuseTalk checkpoints ===")
          tmp = "/tmp/musetalk_hf"
          snapshot_download(
              "TMElyralab/MuseTalk",
              local_dir=tmp,
              local_dir_use_symlinks=False,
              ignore_patterns=["*.md", "*.gitattributes"],
          )
          for sub in ["musetalk", "musetalkV15"]:
              src = os.path.join(tmp, sub)
              dst = mkd(sub)
              if os.path.isdir(src):
                  for f in os.listdir(src):
                      fp = os.path.join(src, f)
                      if os.path.isfile(fp):
                          shutil.copy2(fp, os.path.join(dst, f))
                          sz = os.path.getsize(os.path.join(dst, f)) // (1024*1024)
                          print(f"  {sub}/{f} ({sz} MB)")
              else:
                  print(f"  WARNING: {sub}/ not found")
          shutil.rmtree(tmp)

          # inference code expects config.json; HF repo ships musetalk.json
          for sub in ["musetalk", "musetalkV15"]:
              src = os.path.join(base, sub, "musetalk.json")
              dst = os.path.join(base, sub, "config.json")
              if os.path.exists(src) and not os.path.exists(dst):
                  shutil.copy2(src, dst)
                  print(f"  Created {sub}/config.json")

          # ── 2. DWPose ──────────────────────────────────────────────────────
          print("\n=== 2/6: DWPose ===")
          dw = mkd("dwpose")
          hf_hub_download("yzd-v/DWPose", "dw-ll_ucoco_384.pth",
                          local_dir=dw, local_dir_use_symlinks=False)
          print(f"  dw-ll_ucoco_384.pth OK")

          # ── 3. SD VAE (dir must be named sd-vae per MuseTalk config) ───────
          print("\n=== 3/6: SD VAE ft mse ===")
          snapshot_download(
              "stabilityai/sd-vae-ft-mse",
              local_dir=mkd("sd-vae"),
              local_dir_use_symlinks=False,
              ignore_patterns=["*.md", "*.txt", "*.py", "*.gitattributes"],
          )
          print("  sd-vae/ OK")

          # ── 4. Whisper tiny ────────────────────────────────────────────────
          print("\n=== 4/6: Whisper tiny ===")
          snapshot_download(
              "openai/whisper-tiny",
              local_dir=mkd("whisper"),
              local_dir_use_symlinks=False,
              ignore_patterns=["*.md", "*.txt", "*.gitattributes"],
          )
          print("  whisper/ OK")

          # ── 5. SyncNet ─────────────────────────────────────────────────────
          print("\n=== 5/6: SyncNet ===")
          hf_hub_download("ByteDance/LatentSync", "latentsync_syncnet.pt",
                          local_dir=mkd("syncnet"), local_dir_use_symlinks=False)
          print("  latentsync_syncnet.pt OK")

          # ── 6. face-parse-bisent ───────────────────────────────────────────
          print("\n=== 6/6: face-parse-bisent ===")
          fp_dir = mkd("face-parse-bisent")

          # resnet18 backbone from PyTorch CDN
          resnet_dst = os.path.join(fp_dir, "resnet18-5c106cde.pth")
          urllib.request.urlretrieve(
              "https://download.pytorch.org/models/resnet18-5c106cde.pth",
              resnet_dst,
          )
          print(f"  resnet18 OK ({os.path.getsize(resnet_dst) // (1024*1024)} MB)")

          # 79999_iter.pth via gdown (Google Drive) — positional url_or_id syntax
          bisent_dst = os.path.join(fp_dir, "79999_iter.pth")
          import gdown
          gdown.download(
              "https://drive.google.com/uc?id=154JgKpzCPW82qINcVieuPH3fZ2e0P812",
              bisent_dst,
              quiet=False,
          )
          if not os.path.exists(bisent_dst) or os.path.getsize(bisent_dst) < 1000:
              print("  gdown failed — file missing or too small")
              sys.exit(1)
          print(f"  79999_iter.pth OK ({os.path.getsize(bisent_dst) // (1024*1024)} MB)")

          # ── 7. CodeFormer weights ──────────────────────────────────────────
          print("\n=== 7/9: CodeFormer weights ===")
          cf_dir = mkd("codeformer")
          cf_dst = os.path.join(cf_dir, "codeformer.pth")
          urllib.request.urlretrieve(
              "https://github.com/sczhou/CodeFormer/releases/download/v0.1.0/codeformer.pth",
              cf_dst,
          )
          print(f"  codeformer.pth OK ({os.path.getsize(cf_dst) // (1024*1024)} MB)")

          # ── 8. Real-ESRGAN weights ─────────────────────────────────────────
          print("\n=== 8/9: Real-ESRGAN weights ===")
          esrgan_dir = mkd("realesrgan")
          esrgan_dst = os.path.join(esrgan_dir, "RealESRGAN_x4plus.pth")
          urllib.request.urlretrieve(
              "https://github.com/xinntao/Real-ESRGAN/releases/download/v0.1.0/RealESRGAN_x4plus.pth",
              esrgan_dst,
          )
          print(f"  RealESRGAN_x4plus.pth OK ({os.path.getsize(esrgan_dst) // (1024*1024)} MB)")

          # ── 9. facexlib detection + parsing models (used by CodeFormer) ────
          print("\n=== 9/9: facexlib models ===")
          det_dir = mkd("facelib", "detection")
          parse_dir = mkd("facelib", "parsing")
          facelib_files = [
              (det_dir,   "detection_Resnet50_Final.pth",
               "https://github.com/xinntao/facexlib/releases/download/v0.1.0/detection_Resnet50_Final.pth"),
              (parse_dir, "parsing_parsenet.pth",
               "https://github.com/xinntao/facexlib/releases/download/v0.2.2/parsing_parsenet.pth"),
          ]
          for dst_dir, fname, url in facelib_files:
              dst = os.path.join(dst_dir, fname)
              urllib.request.urlretrieve(url, dst)
              print(f"  {fname} OK ({os.path.getsize(dst) // (1024*1024)} MB)")

          # ── Summary ────────────────────────────────────────────────────────
          print("\n=== Download complete ===")
          for d in sorted(os.listdir(base)):
              p = os.path.join(base, d)
              if os.path.isdir(p):
                  files = [f for f in os.listdir(p) if not f.startswith(".")]
                  mb = sum(os.path.getsize(os.path.join(p, f))
                           for f in os.listdir(p)
                           if os.path.isfile(os.path.join(p, f))) // (1024*1024)
                  print(f"  {d}/: {files} ({mb} MB)")
          PYEOF

      - name: Verify required model files
        run: |
          OK=true
          for f in \
            "musetalk/musetalk.json" \
            "musetalk/pytorch_model.bin" \
            "dwpose/dw-ll_ucoco_384.pth" \
            "face-parse-bisent/79999_iter.pth" \
            "face-parse-bisent/resnet18-5c106cde.pth" \
            "codeformer/codeformer.pth" \
            "realesrgan/RealESRGAN_x4plus.pth" \
            "facelib/detection/detection_Resnet50_Final.pth" \
            "facelib/parsing/parsing_parsenet.pth"; do
            path="services/api/runpod-worker/musetalk_models/$f"
            if [ -f "$path" ]; then
              echo "  OK: $f"
            else
              echo "  MISSING: $f"
              OK=false
            fi
          done
          [ "$OK" = "true" ] || exit 1

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/api/runpod-worker
          file: services/api/runpod-worker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/leadflow-musetalk:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/leadflow-musetalk:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
